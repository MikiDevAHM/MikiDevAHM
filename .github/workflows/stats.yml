name: Generate GitHub Streak SVG

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  streak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate streak SVG
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const pathDir = "generated";
            fs.mkdirSync(pathDir, { recursive: true });

            const username = "MikiDevAHM";

            // pegar informações do usuário
            const userQuery = await github.graphql(`
              query($login: String!) {
                user(login: $login) {
                  createdAt
                  contributionsCollection {
                    contributionCalendar {
                      totalContributions
                      weeks {
                        contributionDays {
                          date
                          contributionCount
                        }
                      }
                    }
                  }
                }
              }
            `, { login: username });

            const user = userQuery.user;
            const joinedAt = user.createdAt.split("T")[0];
            const totalCommits = user.contributionsCollection.contributionCalendar.totalContributions;

            // calcular streaks
            let currentStreak = 0;
            let maxStreak = 0;
            let tempStreak = 0;

            const days = [];
            user.contributionsCollection.contributionCalendar.weeks.forEach(week => {
              week.contributionDays.forEach(day => {
                days.push({ date: day.date, count: day.contributionCount });
              });
            });

            days.sort((a,b) => new Date(a.date) - new Date(b.date));

            days.forEach(day => {
              if(day.count > 0){
                tempStreak++;
                if(tempStreak > maxStreak) maxStreak = tempStreak;
              } else {
                tempStreak = 0;
              }
            });

            // current streak (último dia com contribuição até hoje)
            const today = new Date().toISOString().split("T")[0];
            const lastDay = days[days.length-1];
            currentStreak = lastDay.count > 0 ? tempStreak : 0;

            const bg = "#282a36";
            const fg = "#f8f8f2";
            const accent = "#bd93f9";

            const svg = `
              <svg width="600" height="180" xmlns="http://www.w3.org/2000/svg">
                <style>
                  text { font-family: "JetBrains Mono", monospace; }
                  .title { font-size: 20px; fill: ${fg}; font-weight: 700; }
                  .label { font-size: 14px; fill: ${accent}; }
                  .value { font-size: 24px; fill: ${fg}; font-weight: 600; }
                </style>
                <rect width="100%" height="100%" fill="${bg}" rx="16"/>
                <text x="30" y="40" class="title">GitHub Streaks</text>
                <text x="30" y="80" class="label">Joined at:</text>
                <text x="200" y="80" class="value">${joinedAt}</text>
                <text x="30" y="110" class="label">Total commits:</text>
                <text x="200" y="110" class="value">${totalCommits}</text>
                <text x="30" y="140" class="label">Current streak:</text>
                <text x="200" y="140" class="value">${currentStreak} days</text>
                <text x="30" y="170" class="label">Max streak:</text>
                <text x="200" y="170" class="value">${maxStreak} days</text>
              </svg>`;

            fs.writeFileSync(`${pathDir}/streak.svg`, svg);
            console.log("SVG de streak gerado com sucesso em 'generated/streak.svg'!");
            
      - name: Commit SVG
        run: |
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add generated/streak.svg
            git commit -m "Atualiza streak SVG"
            git push
