name: Generate GitHub Streak SVG
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  streak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate commit streak SVG
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.METRICS_TOKEN }}
          script: |
            const fs = require("fs");
            const pathDir = "generated";
            fs.mkdirSync(pathDir, { recursive: true });
            
            const username = "MikiDevAHM";
            
            // 1️⃣ Pegar o ID real do usuário
            const viewer = await github.graphql(`
              query($login:String!) {
                user(login:$login) { id }
              }
            `, { login: username });
            
            const userId = viewer.user.id;
            
            // 2️⃣ Buscar commits usando o ID (tipo ID)
            const reposResult = await github.graphql(`
              query($login:String!, $userId:ID!) {
                user(login:$login) {
                  repositories(first:100, ownerAffiliations:OWNER) {
                    nodes {
                      name
                      defaultBranchRef {
                        target {
                          ... on Commit {
                            history(first:100, author:{id:$userId}) {
                              nodes { committedDate }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { login: username, userId });
            
            // 3️⃣ processar commits normalmente
            let allDates = [];
            reposResult.user.repositories.nodes.forEach(repo => {
              if(repo.defaultBranchRef?.target?.history?.nodes){
                repo.defaultBranchRef.target.history.nodes.forEach(c=>{
                  allDates.push(new Date(c.committedDate).toISOString().slice(0,10));
                });
              }
            });
            
            allDates = Array.from(new Set(allDates)).sort();
            
            const totalCommits = allDates.length;
            
            // calcular streaks
            let maxStreak = 0;
            let currentStreak = 0;
            let lastDate = null;
            const today = new Date().toISOString().slice(0,10);
            
            allDates.forEach(d=>{
              if(!lastDate) { currentStreak=1; }
              else {
                const prev = new Date(lastDate);
                const curr = new Date(d);
                const diff = (curr-prev)/(1000*60*60*24);
                if(diff===1) currentStreak++;
                else currentStreak=1;
              }
              if(currentStreak>maxStreak) maxStreak=currentStreak;
              lastDate = d;
            });
            
            // verificar streak atual
            if(lastDate!==today){
              const diff = (new Date(today)-new Date(lastDate))/(1000*60*60*24);
              if(diff>1) currentStreak=0;
            }
            
            // gerar SVG (Dracula theme)
            const width = 600, height = 180;
            const gradientStart = "#bd93f9";
            const gradientEnd = "#ff79c6";
            const bg = "#282a36";
            const fg = "#f8f8f2";
            
            const svg = `
            <svg width="${width}" height="${height}" xmlns="http://www.w3.org/2000/svg">
              <style>
                text { font-family: 'JetBrains Mono', monospace; }
                .title { font-size: 20px; fill: ${fg}; font-weight: bold; }
                .label { font-size: 14px; fill: #8be9fd; }
                .value { font-size: 18px; fill: #f1fa8c; font-weight: bold; }
                .bar-bg { fill: #44475a; rx:6; ry:6; }
              </style>
            
              <rect width="100%" height="100%" rx="18" fill="${bg}"/>
              <text x="30" y="40" class="title">📊 GitHub Stats</text>
              <text x="30" y="80" class="label">🧾 Total Commits</text>
              <text x="200" y="80" class="value">${totalCommits}</text>
            
              <rect x="30" y="90" width="540" height="12" class="bar-bg"/>
              <defs>
                <linearGradient id="gradTotal" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="${gradientStart}"/>
                  <stop offset="100%" stop-color="${gradientEnd}"/>
                </linearGradient>
              </defs>
              <rect x="30" y="90" width="${Math.min(totalCommits,100)*5.4}" height="12" fill="url(#gradTotal)" rx="6" ry="6"/>
            
              <text x="30" y="130" class="label">🔥 Current Streak</text>
              <text x="200" y="130" class="value">${currentStreak} days</text>
            
              <text x="30" y="160" class="label">🏆 Longest Streak</text>
              <text x="200" y="160" class="value">${maxStreak} days</text>
            </svg>
            `;
            
            fs.writeFileSync(`${pathDir}/streak.svg`, svg);
            console.log("SVG de streak gerado com sucesso em 'generated/streak.svg'!");
            
      - name: Commit SVG
        run: |
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add generated/streak.svg
            git commit -m "Atualiza streak SVG"
            git push
