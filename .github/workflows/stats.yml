name: Generate Git Streak SVG

on:
  schedule:
    - cron: "0 3 * * *" # roda todo dia às 3h
  workflow_dispatch:

permissions:
  contents: write

jobs:
  streak:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Streak SVG
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.METRICS_TOKEN }}
          script: |
            const fs = require("fs");
            const pathDir = "generated";
            fs.mkdirSync(pathDir, { recursive: true });

            const username = "MikiDevAHM";

            // Pegar o ID do usuário
            const viewer = await github.graphql(`
              query($login:String!) {
                user(login:$login) { id }
              }
            `, { login: username });
            const userId = viewer.user.id;

            // Pegar todos os repos contribuídos (incluindo orgs)
            const reposData = await github.graphql(`
              query($login:String!, $userId:ID!) {
                user(login:$login) {
                  repositoriesContributedTo(
                    first:100
                    contributionTypes:[COMMIT,PULL_REQUEST]
                    includeUserRepositories:true
                  ) {
                    nodes {
                      name
                      owner { login }
                      defaultBranchRef {
                        target {
                          ... on Commit {
                            history(first:100, author:{id:$userId}) {
                              nodes { committedDate }
                              totalCount
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { login: username, userId });

            const repos = reposData.user.repositoriesContributedTo.nodes;

            // Pegar todas as datas de commits
            let commitDates = [];
            repos.forEach(r => {
              if(r.defaultBranchRef && r.defaultBranchRef.target.history.nodes) {
                r.defaultBranchRef.target.history.nodes.forEach(c => {
                  commitDates.push(new Date(c.committedDate).toISOString().slice(0,10));
                });
              }
            });

            if(commitDates.length === 0){
              console.log("Nenhum commit encontrado. SVG não será gerado.");
              return;
            }

            // ordenar por data
            commitDates.sort();

            // calcular total commits
            const totalCommits = commitDates.length;

            // calcular streaks
            let maxStreak = 1, currentStreak = 1;
            for(let i=1; i<commitDates.length; i++){
              const prev = new Date(commitDates[i-1]);
              const curr = new Date(commitDates[i]);
              const diffDays = (curr-prev)/(1000*60*60*24);
              if(diffDays === 1){
                currentStreak += 1;
              } else if(diffDays > 1){
                if(currentStreak > maxStreak) maxStreak = currentStreak;
                currentStreak = 1;
              }
            }
            if(currentStreak > maxStreak) maxStreak = currentStreak;

            const firstCommit = commitDates[0];

            // cores e estilo Dracula
            const bg = "#282a36", fg = "#f8f8f2", accent = "#bd93f9";
            
            const svg = `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
            <svg width="600" height="180" xmlns="http://www.w3.org/2000/svg">
              <style>
                text { font-family: "JetBrains Mono", monospace; }
                .title { font-size: 20px; fill: ${fg}; font-weight: 700; }
                .label { font-size: 14px; fill: ${accent}; }
                .value { font-size: 24px; fill: ${fg}; font-weight: 600; }
              </style>
            
              <!-- background -->
              <rect width="100%" height="100%" fill="${bg}" rx="16"/>
            
              <!-- title -->
              <text x="30" y="40" class="title">GitHub Streak & Commits</text>
            
              <!-- first commit -->
              <text x="30" y="80" class="label">First commit:</text>
              <text x="200" y="80" class="value">${firstCommit}</text>
            
              <!-- total commits -->
              <text x="30" y="110" class="label">Total commits:</text>
              <text x="200" y="110" class="value">${totalCommits}</text>
            
              <!-- current streak -->
              <text x="30" y="140" class="label">Current streak:</text>
              <text x="200" y="140" class="value">${currentStreak} days</text>
            
              <!-- max streak -->
              <text x="30" y="170" class="label">Max streak:</text>
              <text x="200" y="170" class="value">${maxStreak} days</text>
            </svg>`;

            fs.writeFileSync(`${pathDir}/streak.svg`, svg);
            console.log("SVG de streak gerado com sucesso em 'generated/streak.svg'!");
            
      - name: Commit SVG
        run: |
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add generated/streak.svg
            git commit -m "Atualiza streak SVG"
            git push
