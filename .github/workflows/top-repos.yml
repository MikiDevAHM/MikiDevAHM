name: Top Contributed Repo Cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate cached top repos SVG cards
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.METRICS_TOKEN }}
          script: |
            const fs = require("fs");
            const path = "generated";
            const cacheFile = path + "/cache.json";
            fs.mkdirSync(path, { recursive: true });

            const username = "MikiDevAHM";
            const EXCLUDED = ["dotfiles", "test-repo"];

            // check cache
            let cache = {};
            if(fs.existsSync(cacheFile)){
              cache = JSON.parse(fs.readFileSync(cacheFile,"utf8"));
            }

            // pegar id global do usuário
            const viewer = await github.graphql(`
            query($login:String!) { user(login:$login) { id } }`, {login: username});
            const userId = viewer.user.id;

            // buscar repos contribuídos
            const query = await github.graphql(`
            query($login:String!, $userId:ID!) {
              user(login:$login) {
                repositoriesContributedTo(
                  first:100
                  contributionTypes:[COMMIT,PULL_REQUEST]
                  includeUserRepositories:true
                ) {
                  nodes {
                    name
                    stargazerCount
                    owner { login avatarUrl url }
                    defaultBranchRef {
                      target {
                        ... on Commit {
                          history(first:0, author:{id:$userId}) { totalCount }
                        }
                      }
                    }
                  }
                }
              }
            }`, {login: username, userId});

            let repos = query.user.repositoriesContributedTo.nodes
              .filter(r=>r.defaultBranchRef)
              .filter(r=>!EXCLUDED.includes(r.name))
              .map(r=>({
                name: r.name,
                owner: r.owner.login,
                avatar: r.owner.avatarUrl,
                stars: r.stargazerCount,
                commits: r.defaultBranchRef.target.history.totalCount,
                url: r.owner.url + "/" + r.name
              }))
              .filter(r=>r.commits>0);

            // ordenar por commits
            repos.sort((a,b)=>b.commits-a.commits);
            repos = repos.slice(0,5);

            // salvar cache
            fs.writeFileSync(cacheFile, JSON.stringify(repos));

            const maxCommits = Math.max(...repos.map(r=>r.commits),1);

            // cores gradiente Dracula
            const gradientStart = "#bd93f9";
            const gradientEnd = "#ff79c6";

            repos.forEach((repo,i)=>{
              const barWidth = Math.round((repo.commits/maxCommits)*520);

              // ranking medal
              const medal = i===0?"🥇":i===1?"🥈":i===2?"🥉":"";

              const svg = `
              <svg width="650" height="130" xmlns="http://www.w3.org/2000/svg">
              
              <style>
              text{font-family:JetBrains Mono, monospace}
              </style>
              
              <a href="${repo.url}">
              
              <rect width="100%" height="100%" rx="18" fill="#282a36"/>
              
              <image href="${repo.avatar}" x="25" y="30" width="40" height="40"/>
              
              <text x="80" y="45" fill="#f8f8f2" font-size="18" font-weight="600">
              ${medal} ${repo.owner}/${repo.name}
              </text>
              
              <text x="80" y="70" fill="#8be9fd" font-size="14">
              🧾 ${repo.commits} commits
              </text>
              
              <text x="200" y="70" fill="#f1fa8c" font-size="14">
              ⭐ ${repo.stars}
              </text>
              
              <!-- background bar -->
              <rect x="80" y="85" width="520" height="12" rx="6" fill="#44475a"/>
              
              <!-- gradient bar -->
              <defs>
              <linearGradient id="grad${i}" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="${gradientStart}"/>
                <stop offset="100%" stop-color="${gradientEnd}"/>
              </linearGradient>
              </defs>
              <rect x="80" y="85" width="${barWidth}" height="12" rx="6" fill="url(#grad${i})"/>
              
              <!-- counter -->
              <text x="610" y="96" fill="#f8f8f2" font-size="12">
              ${repo.commits}/${maxCommits}
              </text>
              
              </a>
              
              </svg>
            `;

              fs.writeFileSync(`${path}/repo-${i+1}.svg`,svg);
            });

            // gerar GRID
            const cardWidth = 650;
            const cardHeight = 130;
            const gap = 20;
            const gridCols = 2;
            const gridRows = Math.ceil(repos.length/gridCols);
            const gridWidth = cardWidth*gridCols + gap*(gridCols-1);
            const gridHeight = cardHeight*gridRows + gap*(gridRows-1);

            let gridSvg = `<svg width="${gridWidth}" height="${gridHeight}" xmlns="http://www.w3.org/2000/svg">`;

            repos.forEach((r,i)=>{
              const col = i % gridCols;
              const row = Math.floor(i/gridCols);
              const x = col*(cardWidth+gap);
              const y = row*(cardHeight+gap);
              gridSvg += `<image href="repo-${i+1}.svg" x="${x}" y="${y}" width="${cardWidth}" height="${cardHeight}"/>`;
            });

            gridSvg += "</svg>";
            fs.writeFileSync(`${path}/grid.svg`,gridSvg);
