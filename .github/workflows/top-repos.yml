name: Top Contributed Repo Cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate cached top repos SVG cards
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.METRICS_TOKEN }}
          script: |
            const fs = require("fs");
            const pathDir = "generated";
            const cacheFile = pathDir + "/cache.json";
            fs.mkdirSync(pathDir, { recursive: true });

            const username = "MikiDevAHM";
            const EXCLUDED = ["dotfiles", "test-repo"];

            // pegar id global do usuário
            const viewer = await github.graphql(`
              query($login:String!) { user(login:$login) { id } }
            `, { login: username });
            const userId = viewer.user.id;

            // carregar cache
            let cache = {};
            if(fs.existsSync(cacheFile)){
              cache = JSON.parse(fs.readFileSync(cacheFile,"utf8"));
            }

            // buscar repos contribuídos
            const result = await github.graphql(`
              query($login:String!, $userId:ID!) {
                user(login:$login) {
                  repositoriesContributedTo(
                    first:100
                    contributionTypes:[COMMIT,PULL_REQUEST]
                    includeUserRepositories:true
                  ) {
                    nodes {
                      name
                      stargazerCount
                      owner { login avatarUrl url }
                      defaultBranchRef {
                        target {
                          ... on Commit {
                            history(first:0, author:{id:$userId}) { totalCount }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { login: username, userId });

            let repos = result.user.repositoriesContributedTo.nodes
              .filter(r => r.defaultBranchRef)
              .filter(r => !EXCLUDED.includes(r.name))
              .map(r => ({
                name: r.name,
                owner: r.owner.login,
                avatar: r.owner.avatarUrl,
                stars: r.stargazerCount,
                commits: r.defaultBranchRef.target.history.totalCount,
                url: r.owner.url + "/" + r.name
              }))
              .filter(r => r.commits > 0);

            if (repos.length === 0) {
              console.log("Nenhum repo com commits encontrados, workflow vai terminar sem gerar SVGs.");
              return;
            }

            // ordenar por commits e pegar top 5
            repos.sort((a,b) => b.commits - a.commits);
            repos = repos.slice(0,5);

            // salvar cache
            fs.writeFileSync(cacheFile, JSON.stringify(repos));

            const maxCommits = Math.max(...repos.map(r => r.commits),1);
            const gradientStart = "#bd93f9";
            const gradientEnd = "#ff79c6";

            const cardWidth = 700;
            const cardHeight = 140;

            // gerar SVGs individuais inline
            const svgCards = repos.map((repo,i)=>{
              const barWidth = Math.round((repo.commits/maxCommits)*500);
              const medal = i===0?"🥇":i===1?"🥈":i===2?"🥉":"";

              const svg = `
                <svg width="${cardWidth}" height="${cardHeight}" xmlns="http://www.w3.org/2000/svg">
                <style>text{font-family:JetBrains Mono, monospace}</style>
                <a href="${repo.url}">
                  <rect width="100%" height="100%" rx="18" fill="#282a36"/>
                  <image href="${repo.avatar}" x="30" y="35" width="50" height="50"/>
                  <text x="90" y="55" fill="#f8f8f2" font-size="20" font-weight="600">${medal} ${repo.owner}/${repo.name}</text>
                  <text x="90" y="85" fill="#8be9fd" font-size="14">🧾 ${repo.commits} commits</text>
                  <text x="250" y="85" fill="#f1fa8c" font-size="14">⭐ ${repo.stars}</text>
                  <rect x="90" y="95" width="500" height="16" rx="8" fill="#44475a"/>
                  <defs>
                    <linearGradient id="grad${i}" x1="0%" y1="0%" x2="100%" y2="0%">
                      <stop offset="0%" stop-color="${gradientStart}"/>
                      <stop offset="100%" stop-color="${gradientEnd}"/>
                    </linearGradient>
                  </defs>
                  <rect x="90" y="95" width="${barWidth}" height="16" rx="8" fill="url(#grad${i})"/>
                  <text x="600" y="110" fill="#f8f8f2" font-size="10">${repo.commits}/${maxCommits}</text>
                </a>
                </svg>`;
              return svg;
            });

            // gerar GRID inline
            const gap = 20;
            const gridCols = 2;
            const gridRows = Math.ceil(svgCards.length/gridCols);
            const gridWidth = cardWidth*gridCols + gap*(gridCols-1);
            const gridHeight = cardHeight*gridRows + gap*(gridRows-1);

            let gridSvg = `<svg width="${gridWidth}" height="${gridHeight}" xmlns="http://www.w3.org/2000/svg">`;
            svgCards.forEach((svg,i)=>{
              const col = i % gridCols;
              const row = Math.floor(i/gridCols);
              const x = col*(cardWidth+gap);
              const y = row*(cardHeight+gap);
              // inline o SVG individual
              const content = svg.replace('<svg width="700" height="140" xmlns="http://www.w3.org/2000/svg">','').replace('</svg>','');
              gridSvg += `<g transform="translate(${x},${y})">${content}</g>`;
            });
            gridSvg += "</svg>";
            fs.writeFileSync(`${pathDir}/grid.svg`, gridSvg);

            console.log("SVGs gerados com sucesso na pasta 'generated/'!");

      - name: Commit generated SVGs
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/*.svg
          git commit -m "Update top repos SVGs" || echo "Nothing to commit"
          git push
