name: Top Contributed Repo Cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate top repos SVG cards
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.METRICS_TOKEN }}
          script: |
            const fs    = require("fs");
            const https = require("https");

            const pathDir   = "generated";
            const cacheFile = pathDir + "/cache.json";
            fs.mkdirSync(pathDir, { recursive: true });

            const username = "MikiDevAHM";
            const EXCLUDED = ["dotfiles", "test-repo"];
            const TOP_N    = 5;

            // --- Helper: baixar imagem como base64 ---
            function fetchImageBase64(url) {
              return new Promise((resolve) => {
                https.get(url, (res) => {
                  const chunks = [];
                  res.on("data", c => chunks.push(c));
                  res.on("end", () => {
                    const mime = res.headers["content-type"] || "image/png";
                    resolve(`data:${mime};base64,${Buffer.concat(chunks).toString("base64")}`);
                  });
                }).on("error", () => resolve(null));
              });
            }

            // --- Buscar ID do usuário ---
            const viewer = await github.graphql(`
              query($login: String!) { user(login: $login) { id } }
            `, { login: username });
            const userId = viewer.user.id;

            // --- Buscar repos contribuídos ---
            let repos = [];
            try {
              const result = await github.graphql(`
                query($login: String!, $userId: ID!) {
                  user(login: $login) {
                    repositoriesContributedTo(
                      first: 100
                      contributionTypes: [COMMIT, PULL_REQUEST]
                      includeUserRepositories: true
                    ) {
                      nodes {
                        name
                        url
                        stargazerCount
                        owner { login avatarUrl }
                        defaultBranchRef {
                          target {
                            ... on Commit {
                              history(first: 0, author: { id: $userId }) { totalCount }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `, { login: username, userId });

              repos = result.user.repositoriesContributedTo.nodes
                .filter(r => r.defaultBranchRef?.target?.history)
                .filter(r => !EXCLUDED.includes(r.name))
                .map(r => ({
                  name:    r.name,
                  owner:   r.owner.login,
                  avatar:  r.owner.avatarUrl,
                  stars:   r.stargazerCount,
                  commits: r.defaultBranchRef.target.history.totalCount,
                  url:     r.url,
                }))
                .filter(r => r.commits > 0)
                .sort((a, b) => b.commits - a.commits)
                .slice(0, TOP_N);

              if (repos.length === 0) {
                console.log("⚠️  Nenhum repo com commits encontrado.");
              } else {
                fs.writeFileSync(cacheFile, JSON.stringify(repos, null, 2));
                console.log(`✅ ${repos.length} repos encontrados, cache salvo.`);
              }
            } catch (err) {
              console.error("❌ Erro na query GraphQL:", err.message);
            }

            // --- Fallback para cache ---
            if (repos.length === 0 && fs.existsSync(cacheFile)) {
              repos = JSON.parse(fs.readFileSync(cacheFile, "utf8"));
              console.log(`♻️  Usando cache com ${repos.length} repos.`);
            }

            if (repos.length === 0) {
              console.log("Nada para gerar. Encerrando.");
              return;
            }

            // --- Baixar avatares como base64 ---
            console.log("Baixando avatares...");
            const avatarCache = {};
            for (const repo of repos) {
              if (!avatarCache[repo.avatar]) {
                const smallUrl = repo.avatar.replace(/\?.*$/, "") + "?size=48";
                avatarCache[repo.avatar] = await fetchImageBase64(smallUrl);
              }
            }

            // --- Constantes de layout e paleta Dracula ---
            const maxCommits  = Math.max(...repos.map(r => r.commits), 1);
            const medals      = ["🥇", "🥈", "🥉", "4th", "5th"];

            const BG_TOP      = "#2d2f45";
            const BG_BOT      = "#262837";
            const GRAD_START  = "#bd93f9";
            const GRAD_END    = "#ff79c6";
            const FG_PRIMARY  = "#f8f8f2";
            const FG_BLUE     = "#8be9fd";
            const FG_YELLOW   = "#f1fa8c";
            const FG_MUTED    = "#6272a4";
            const TRACK_COLOR = "#363847";
            const CARD_W      = 720;
            const CARD_H      = 110;
            const AV_CX       = 46;
            const AV_CY       = 55;
            const AV_R        = 22;
            const CONTENT_X   = 85;
            const BAR_X       = 85;
            const BAR_W       = 520;
            const BAR_Y       = 74;
            const BAR_H       = 12;

            // --- Gerar SVGs ---
            repos.forEach((repo, i) => {
              const barFill   = Math.round((repo.commits / maxCommits) * BAR_W);
              const pct       = Math.round((repo.commits / maxCommits) * 100);
              const medal     = medals[i] ?? "";
              const avatarB64 = avatarCache[repo.avatar] ?? null;
              const initial   = (repo.owner[0] ?? "?").toUpperCase();
              const starsStr  = repo.stars >= 1000
                ? (repo.stars / 1000).toFixed(1) + "k"
                : String(repo.stars);

              const avatarEl = avatarB64
                ? `<defs><clipPath id="av${i}"><circle cx="${AV_CX}" cy="${AV_CY}" r="${AV_R}"/></clipPath></defs>
                <image href="${avatarB64}" x="${AV_CX - AV_R}" y="${AV_CY - AV_R}" width="${AV_R * 2}" height="${AV_R * 2}" clip-path="url(#av${i})"/>`
                              : `<circle cx="${AV_CX}" cy="${AV_CY}" r="${AV_R}" fill="#44475a"/>
                <text x="${AV_CX}" y="${AV_CY + 5}" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="${GRAD_START}">${initial}</text>`;
              
                            const svg = `<svg width="${CARD_W}" height="${CARD_H}" viewBox="0 0 ${CARD_W} ${CARD_H}" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="bgGrad${i}" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="${BG_TOP}"/>
                    <stop offset="100%" stop-color="${BG_BOT}"/>
                  </linearGradient>
                  <linearGradient id="barGrad${i}" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="${GRAD_START}"/>
                    <stop offset="100%" stop-color="${GRAD_END}"/>
                  </linearGradient>
                  <linearGradient id="glowGrad${i}" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="${GRAD_START}" stop-opacity="0.18"/>
                    <stop offset="100%" stop-color="${GRAD_END}"  stop-opacity="0"/>
                  </linearGradient>
                </defs>
                <style>text { font-family: "JetBrains Mono", "Fira Code", monospace; }</style>
              
                <rect width="${CARD_W}" height="${CARD_H}" rx="16" fill="url(#bgGrad${i})"/>
                <rect x="0" y="0" width="4" height="${CARD_H}" rx="2" fill="url(#barGrad${i})"/>
                <rect x="${BAR_X}" y="${BAR_Y - 6}" width="${BAR_W}" height="${BAR_H + 12}" rx="8" fill="url(#glowGrad${i})"/>
              
                ${avatarEl}
              
                <text x="${CONTENT_X}" y="32" font-size="15" font-weight="700" fill="${FG_PRIMARY}">${medal} ${repo.owner}/${repo.name}</text>
                <text x="${CONTENT_X}" y="56" font-size="12" fill="${FG_BLUE}">◆ ${repo.commits.toLocaleString()} commits</text>
                <text x="230" y="56" font-size="12" fill="${FG_YELLOW}">★ ${starsStr}</text>
                <circle cx="284" cy="51" r="2" fill="${FG_MUTED}"/>
                <text x="295" y="56" font-size="12" fill="${FG_MUTED}">${pct}% of top</text>
              
                <rect x="${BAR_X}" y="${BAR_Y}" width="${BAR_W}" height="${BAR_H}" rx="6" fill="${TRACK_COLOR}"/>
                <rect x="${BAR_X}" y="${BAR_Y}" width="${barFill}" height="${BAR_H}" rx="6" fill="url(#barGrad${i})"/>
                <rect x="${BAR_X}" y="${BAR_Y}" width="${barFill}" height="${Math.floor(BAR_H / 2)}" rx="6" fill="white" opacity="0.07"/>
              </svg>`;

              const outPath = `${pathDir}/repo-${i + 1}.svg`;
              fs.writeFileSync(outPath, svg.trim());
              console.log(`✅ ${outPath} — ${repo.owner}/${repo.name} (${repo.commits} commits, ${pct}%)`);
            });

      - name: Commit generated SVGs
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/
          git diff --cached --quiet || git commit -m "chore: update top repos SVGs [skip ci]"
          git push
