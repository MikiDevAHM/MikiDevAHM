name: Top Contributed Repo Cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate repo SVG cards
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.METRICS_TOKEN }}
          script: |
            const fs = require("fs");

            const username = "MikiDevAHM";

            // repos que NÃO devem aparecer
            const EXCLUDED = [
              "dotfiles",
              "test-repo"
            ];

            const query = await github.graphql(`
            query($login:String!) {
              user(login:$login) {
                repositoriesContributedTo(
                  first:100
                  contributionTypes:[COMMIT,PULL_REQUEST]
                  includeUserRepositories:true
                ) {
                  nodes {
                    name
                    stargazerCount
                    owner { login avatarUrl }
                    defaultBranchRef {
                      target {
                        ... on Commit {
                          history(author:{id:""}) {
                            totalCount
                          }
                        }
                      }
                    }
                  }
                }
              }
            }`, { login: username });

            let repos = query.user.repositoriesContributedTo.nodes
              .filter(r => !EXCLUDED.includes(r.name))
              .slice(0,5);

            fs.mkdirSync("generated", { recursive: true });

            const maxStars = Math.max(...repos.map(r => r.stargazerCount), 1);

            repos.forEach((repo, i) => {
              const stars = repo.stargazerCount;
              const commits = repo.defaultBranchRef?.target?.history?.totalCount || 0;

              const barWidth = Math.round((stars / maxStars) * 420);

              const svg = `
              <svg width="520" height="110" xmlns="http://www.w3.org/2000/svg">
                <style>
                  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
                  text { font-family: 'JetBrains Mono', monospace; }
                </style>

                <rect width="100%" height="100%" rx="14" fill="#282a36"/>

                <!-- repo icon -->
                <circle cx="40" cy="40" r="20" fill="#44475a"/>
                <text x="40" y="45" text-anchor="middle" fill="#bd93f9" font-size="18">📦</text>

                <!-- repo name -->
                <text x="80" y="35" fill="#f8f8f2" font-size="16" font-weight="600">
                  ${repo.owner.login}/${repo.name}
                </text>

                <!-- stars -->
                <text x="80" y="60" fill="#f1fa8c" font-size="13">
                  ⭐ ${stars}
                </text>

                <!-- commits -->
                <text x="160" y="60" fill="#8be9fd" font-size="13">
                  🧾 ${commits} commits
                </text>

                <!-- background bar -->
                <rect x="80" y="75" width="420" height="10" rx="6" fill="#44475a"/>

                <!-- progress -->
                <rect x="80" y="75" width="${barWidth}" height="10" rx="6" fill="#bd93f9"/>

                <!-- counter -->
                <text x="505" y="85" text-anchor="end" fill="#f8f8f2" font-size="11">
                  ${stars}/${maxStars}
                </text>
              </svg>
              `;

              fs.writeFileSync(`generated/repo-${i+1}.svg`, svg);
            });

      - name: Commit cards
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add generated/*.svg
          git commit -m "update repo cards" || exit 0
          git push
