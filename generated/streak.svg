
<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="600" height="180" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: "JetBrains Mono", monospace; }
    .title { font-size: 20px; fill: #f8f8f2; font-weight: 700; }
    .label { font-size: 14px; fill: #bd93f9; }
    .value { font-size: 24px; fill: #f8f8f2; font-weight: 600; }
  </style>

  <rect width="100%" height="100%" fill="#282a36" rx="16"/>

  <text x="30" y="40" class="title">GitHub Streak &amp; Commits</text>
  <text x="30" y="80" class="label">First commit:</text>
  <text x="200" y="80" class="value">2025-04-06</text>
  <text x="30" y="110" class="label">Total commits:</text>
  <text x="200" y="110" class="value">636</text>
  <text x="30" y="140" class="label">Current streak:</text>
  <text x="200" y="140" class="value">1 days</text>
  <text x="30" y="170" class="label">Max streak:</text>
  <text x="200" y="170" class="value">5 days</text>
</svg>